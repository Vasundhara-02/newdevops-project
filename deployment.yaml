apiVersion: apps/v1
kind: Deployment

metadata:
  name: self-healing-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: self-healing

  template:
    metadata:
      labels:
        app: self-healing

    spec:
      containers:
        - name: self-healing
          image: vasundhara02/self-healing-app
          ports:
            - containerPort: 3000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5